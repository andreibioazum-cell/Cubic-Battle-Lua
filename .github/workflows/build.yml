name: Build_Cubic_Battle_FAST
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ========== КЕШИ (всё что можно) ==========

      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v1

      - name: Install NDK (cache miss only)
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache love-android source
        id: love-src-cache
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v1

      - name: Clone love-android (cache miss only)
        if: steps.love-src-cache.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          find love-android/app/src/main/cpp -name "gradle-wrapper.jar" -delete 2>/dev/null || true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-deps-${{ hashFiles('love-android/**/*.gradle*', 'love-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-deps-

      - name: Cache native build (.cxx + build folders)
        uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-build-arm64-v1
          restore-keys: |
            native-build-arm64-

      # ========== СБОРКА ==========

      - name: Package game
        run: |
          mkdir -p game-temp
          cd mygame
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/ && echo "Added: $f"
          done
          cd ../game-temp
          ls -la
          zip -9 -q -r ../game.love .
          ls -la ../game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64-v8a only
        run: |
          cd love-android
          sed -i '/abiFilters/d' app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      - name: Append speed settings
        run: |
          cd love-android
          sed -i '/=== Our speed additions ===/,$d' gradle.properties
          cat >> gradle.properties << 'EOF'

          # === Our speed additions ===
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=false
          EOF

      - name: Build APK (with full cache)
        working-directory: love-android
        timeout-minutes: 20
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --max-workers=4 \
            --build-cache \
            --parallel \
            -PdisableCheckLicense \
            2>&1 | tail -40

      - name: Find APK
        if: always()
        run: |
          APK=$(find love-android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            echo "✅ FOUND: $APK"
            cp "$APK" "$GITHUB_WORKSPACE/CubicBattle.apk"
            ls -la "$GITHUB_WORKSPACE/CubicBattle.apk"
          else
            echo "❌ No APK"
            find love-android/app/build/outputs -type f 2>/dev/null | head -20
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
