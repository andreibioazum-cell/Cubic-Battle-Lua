name: Build_Cubic_Battle_ULTRA_FAST

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: game

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Cache NDK
      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653

      - name: Install NDK if missing
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager --install "ndk;25.2.9519653"
          fi

      - name: Export NDK vars
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # ✅ Cache love-android
      - name: Cache love-android
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-v4

      - name: Clone love-android if needed
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # ✅ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v4

      # ✅ Cache native build
      - name: Cache native
        uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-arm64-v4

      # ✅ Package .love
      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      # ✅ Force arm64 only (сильно ускоряет)
      - name: Force arm64
        run: |
          cd love-android
          sed -i '/abiFilters/d' app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      # ✅ Turbo Gradle
      - name: Optimize Gradle
        run: |
          cd love-android
          cat >> gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.configureondemand=true
          android.useAndroidX=true
          EOF

      # ✅ BUILD
      - name: Build APK
        working-directory: love-android
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --build-cache \
            --parallel \
            --console=plain

      # ✅ Collect APK
      - name: Collect APK
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          cp "$APK" CubicBattle.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          compression-level: 0
