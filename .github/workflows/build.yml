name: Build_Cubic_Battle_FAST

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          path: game
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      # Кэширование NDK (ускорение)
      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v6

      - name: Install NDK (if missing)
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # Кэширование love-android (ускорение)
      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v6-${{ hashFiles('love-android/.git') }}
          restore-keys: |
            love-android-src-v6-

      - name: Clone love-android (if missing)
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # Кэширование Gradle (ускорение)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            love-android/.gradle
          key: gradle-v6-${{ hashFiles('love-android/build.gradle', 'love-android/app/build.gradle') }}
          restore-keys: |
            gradle-v6-

      # Кэширование нативных билдов (ускорение)
      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
            love-android/app/build/intermediates
          key: native-v6-${{ hashFiles('love-android/app/src/main/cpp/*') }}
          restore-keys: |
            native-v6-

      - name: Package game.love (быстрее)
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*" -x "*.md" -x "*.txt"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64 (ускорение сборки)
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle (максимальная скорость)
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.configureondemand=true
          android.enableDexingArtifactTransformDesugaring=false
          android.disableCompileSdkCheck=true
          EOF

      - name: Build (минимальный билд)
        working-directory: love-android
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain --max-workers=4

      - name: Collect APK
        run: |
          APK=$(find love-android -name "*.apk" -type f | head -1)
          cp "$APK" CubicBattle.apk

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          compression-level: 0
          retention-days: 7
