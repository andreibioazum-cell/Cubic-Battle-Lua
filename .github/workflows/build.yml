name: Build_Cubic_Battle_FAST
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          path: mygame

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v2

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          fi

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v3

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v3

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build/intermediates/cxx
            love-android/app/build/intermediates/cmake
            love-android/app/build/intermediates/merged_native_libs
          key: native-arm64-v3

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/build/intermediates
            love-android/app/build/generated
            love-android/app/build/tmp
          key: build-intermediates-v3

      - name: Package game.love
        run: |
          cd mygame
          zip -9 -q -r ../game.love *.lua sand.png 2>/dev/null || zip -9 -q -r ../game.love *.lua

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64-v8a
        run: |
          cd love-android
          sed -i '/abiFilters/d' app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      - name: Optimize Gradle
        run: |
          cd love-android
          cat >> gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=false
          android.enableR8.fullMode=false
          EOF

      - name: Build APK
        working-directory: love-android
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --max-workers=4 \
            --build-cache \
            --parallel \
            -Dorg.gradle.internal.http.socketTimeout=60000 \
            2>&1 | grep -E "(BUILD|FAILED|Error)" | head -10

      - name: Find and Copy APK
        run: |
          APK=$(find love-android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./CubicBattle.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: ./CubicBattle.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
