name: Build_Lua_Game_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v1

      - name: Install NDK (if cache miss)
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache love-android repo
        id: love-cache
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-main-v3

      - name: Clone love-android (if cache miss)
        if: steps.love-cache.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          echo "Cloned"

      - name: Remove SDL submodule gradle wrappers (fix validation)
        run: |
          echo "=== Removing nested gradle-wrapper.jar files in SDL ==="
          find love-android/app/src/main/cpp/megasource/libs/SDL2/android-project -name "gradle-wrapper.jar" -delete 2>/dev/null || true
          find love-android/app/src/main/cpp/megasource/libs/SDL3/android-project -name "gradle-wrapper.jar" -delete 2>/dev/null || true
          echo "=== Remaining wrapper jars ==="
          find love-android -name "gradle-wrapper.jar" -type f

      - name: Package game into .love
        run: |
          mkdir -p game-temp
          cd mygame
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/ && echo "Added: $f"
          done
          [ -d "assets" ] && cp -r assets ../game-temp/
          [ -d "images" ] && cp -r images ../game-temp/
          [ -d "sounds" ] && cp -r sounds ../game-temp/

          cd ../game-temp
          echo "=== .love contents ==="
          ls -la
          zip -9 -q -r ../game.love .
          cd ..
          echo "game.love size:"
          ls -la game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          ls -la love-android/app/src/embed/assets/

      - name: Force arm64-v8a only
        run: |
          cd love-android
          BUILD_FILE="app/build.gradle"
          [ -f "app/build.gradle.kts" ] && BUILD_FILE="app/build.gradle.kts"

          if ! grep -q "abiFilters" "$BUILD_FILE"; then
            sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' "$BUILD_FILE"
            echo "abiFilters added"
          fi
          grep -A 1 "abiFilters" "$BUILD_FILE" || true

      - name: Configure Gradle for speed
        run: |
          cd love-android
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=false
          android.enableR8.fullMode=false
          kotlin.incremental=false
          EOF

      - name: Build APK directly (skip setup-gradle action)
        working-directory: love-android
        timeout-minutes: 20
        run: |
          chmod +x gradlew
          echo "=== Building EmbedNoRecordDebug for arm64-v8a only ==="
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --max-workers=4 \
            --build-cache \
            -PdisableCheckLicense \
            2>&1 | tail -120
          echo "=== Build finished ==="

      - name: Find APK location
        if: always()
        run: |
          echo "=== ALL APK files ==="
          find love-android -name "*.apk" -type f 2>&1

          APK_PATH=$(find love-android -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo ""
            echo "✅ Found APK: $APK_PATH"
            ls -la "$APK_PATH"
            cp "$APK_PATH" "$GITHUB_WORKSPACE/CubicBattle.apk"
            ls -la "$GITHUB_WORKSPACE/CubicBattle.apk"
          else
            echo ""
            echo "❌ NO APK FOUND!"
            echo "=== outputs structure ==="
            ls -laR love-android/app/build/outputs/ 2>/dev/null | head -50
            echo ""
            echo "=== Build logs (last error) ==="
            find love-android -name "*.log" -type f 2>/dev/null | head -3
          fi

      - name: Upload APK to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
