name: Build_Cubic_Battle_FAST
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15 минут макс
    steps:
      - uses: actions/checkout@v4
        with:
          path: mygame

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      # NDK кеш
      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-fast-v1

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          fi

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # love-android кеш
      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-src-fast-v1

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
            chmod +x love-android/gradlew
          fi

      # Gradle кеш
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-fast-v1

      # Native build кеш
      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build/intermediates/cxx
            love-android/app/build/intermediates/cmake
            love-android/app/build/intermediates/merged_native_libs
          key: native-fast-v1

      # Build intermediates кеш
      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/build/intermediates
            love-android/app/build/generated
            love-android/app/build/tmp
          key: intermediates-fast-v1

      # Пакетируем .love файл
      - name: Package game.love
        run: |
          cd mygame
          zip -9 -q -r ../game.love . -i "*.lua" "*.png" 2>/dev/null
          echo "Game size: $(du -h ../game.love | cut -f1)"

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      # Только arm64 для скорости
      - name: Force arm64-v8a
        run: |
          cd love-android
          sed -i '/abiFilters/d' app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      # Супер-оптимизация Gradle
      - name: Speed up Gradle
        run: |
          cd love-android
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=false
          android.enableR8.fullMode=false
          android.enableResourceOptimizations=false
          EOF

      # БЫСТРАЯ сборка
      - name: Build APK FAST
        working-directory: love-android
        run: |
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --max-workers=4 \
            --build-cache \
            --parallel \
            -x lint \
            -x test \
            -x lintVitalEmbedNoRecordDebug \
            -Dorg.gradle.internal.http.socketTimeout=30000 \
            -Dorg.gradle.internal.http.connectionTimeout=30000 \
            2>&1 | grep -E "(BUILD SUCCESS|BUILD FAILED)" 

      # Загружаем APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: love-android/app/build/outputs/apk/embedNoRecord/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
