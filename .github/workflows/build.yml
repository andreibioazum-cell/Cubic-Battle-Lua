name: Build_Lua_Game_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone love-android
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git

      - name: Remove SDL gradle wrappers
        run: |
          find love-android/app/src/main/cpp -name "gradle-wrapper.jar" -delete 2>/dev/null || true

      - name: Package game
        run: |
          mkdir -p game-temp
          cd mygame
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/
          done
          cd ../game-temp
          ls -la
          zip -9 -q -r ../game.love .
          cd ..
          ls -la game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          ls -la love-android/app/src/embed/assets/

      - name: Force arm64 + force APK output
        run: |
          cd love-android
          BUILD_FILE="app/build.gradle"
          [ -f "app/build.gradle.kts" ] && BUILD_FILE="app/build.gradle.kts"

          # arm64 only
          sed -i '/abiFilters/d' "$BUILD_FILE"
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' "$BUILD_FILE"

          echo ""
          echo "=== Final build.gradle ==="
          cat "$BUILD_FILE"

      - name: Gradle config
        run: |
          cd love-android
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=false
          EOF

      - name: Build APK
        working-directory: love-android
        timeout-minutes: 22
        run: |
          chmod +x gradlew
          # Сначала пробуем EmbedNoRecord
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense 2>&1 | tail -80 || true

          # Если не вышло — пробуем просто Embed
          if ! find . -name "*.apk" -type f | grep -q apk; then
            echo "=== Trying assembleEmbedDebug ==="
            ./gradlew assembleEmbedDebug \
              --no-daemon --max-workers=4 -PdisableCheckLicense 2>&1 | tail -80 || true
          fi

          # Если опять не вышло — простой assembleDebug
          if ! find . -name "*.apk" -type f | grep -q apk; then
            echo "=== Trying assembleDebug ==="
            ./gradlew assembleDebug \
              --no-daemon --max-workers=4 -PdisableCheckLicense 2>&1 | tail -80 || true
          fi

      - name: Inspect outputs
        if: always()
        run: |
          echo "=== ALL APK/AAB files ==="
          find love-android -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
          echo ""
          echo "=== outputs tree (full) ==="
          find love-android/app/build/outputs -type f 2>/dev/null
          echo ""
          echo "=== outputs structure ==="
          ls -laR love-android/app/build/outputs/ 2>/dev/null | head -100

      - name: Copy APK to root
        if: always()
        run: |
          APK_PATH=$(find love-android -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "✅ Found: $APK_PATH"
            ls -la "$APK_PATH"
            cp "$APK_PATH" "$GITHUB_WORKSPACE/CubicBattle.apk"
            ls -la "$GITHUB_WORKSPACE/CubicBattle.apk"
          else
            echo "❌ No APK. Trying AAB..."
            AAB_PATH=$(find love-android -name "*.aab" -type f | head -1)
            if [ -n "$AAB_PATH" ]; then
              echo "Found AAB instead: $AAB_PATH"
              cp "$AAB_PATH" "$GITHUB_WORKSPACE/CubicBattle.aab"
            fi
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Build
          path: |
            CubicBattle.apk
            CubicBattle.aab
          if-no-files-found: warn
          retention-days: 30
