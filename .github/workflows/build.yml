name: Build_Lua_Game_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone love-android
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git

      - name: Remove SDL gradle wrappers
        run: |
          find love-android/app/src/main/cpp -name "gradle-wrapper.jar" -delete 2>/dev/null || true

      - name: Inspect ORIGINAL gradle.properties
        run: |
          echo "=== ORIGINAL gradle.properties ==="
          cat love-android/gradle.properties
          echo ""
          echo "=== ORIGINAL app/build.gradle (lines around line 14) ==="
          sed -n '1,30p' love-android/app/build.gradle

      - name: Package game
        run: |
          mkdir -p game-temp
          cd mygame
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/ && echo "Added: $f"
          done
          cd ../game-temp
          ls -la
          zip -9 -q -r ../game.love .
          cd ..
          ls -la game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64 only
        run: |
          cd love-android
          BUILD_FILE="app/build.gradle"
          sed -i '/abiFilters/d' "$BUILD_FILE"
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' "$BUILD_FILE"

      - name: APPEND speed settings to gradle.properties (NOT overwrite!)
        run: |
          cd love-android
          # Добавляем НАШИ настройки В КОНЕЦ существующего файла
          cat >> gradle.properties << 'EOF'

          # === Our speed additions ===
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          EOF
          echo "=== FINAL gradle.properties ==="
          cat gradle.properties

      - name: Build APK
        working-directory: love-android
        timeout-minutes: 22
        continue-on-error: true
        run: |
          chmod +x gradlew

          echo "=== Attempt 1: assembleEmbedNoRecordDebug ==="
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-1.log | tail -60

          if find . -name "*.apk" -type f | grep -q apk; then
            echo "✅ APK from attempt 1"
            exit 0
          fi

          echo ""
          echo "=== Attempt 2: assembleEmbedDebug ==="
          ./gradlew assembleEmbedDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-2.log | tail -60

          if find . -name "*.apk" -type f | grep -q apk; then
            echo "✅ APK from attempt 2"
            exit 0
          fi

          echo ""
          echo "=== Attempt 3: assembleDebug ==="
          ./gradlew assembleDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-3.log | tail -60

      - name: Hunt for APK
        if: always()
        run: |
          echo "=== ALL APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== outputs structure ==="
          find love-android/app/build/outputs -type f 2>/dev/null | head -30

          APK=$(find love-android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ FOUND: $APK"
            cp "$APK" "$GITHUB_WORKSPACE/CubicBattle.apk"
            ls -la "$GITHUB_WORKSPACE/CubicBattle.apk"
          else
            echo "❌ No APK"
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs
          path: love-android/build-*.log
          if-no-files-found: ignore
          retention-days: 7
