name: Build_Cubic_Battle_FAST
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          path: mygame

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-fast-v1

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          fi

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-src-fast-v1

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
            chmod +x love-android/gradlew
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-fast-v1

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build/intermediates/cxx
            love-android/app/build/intermediates/cmake
            love-android/app/build/intermediates/merged_native_libs
          key: native-fast-v1

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/build/intermediates
            love-android/app/build/generated
            love-android/app/build/tmp
          key: intermediates-fast-v1

      - name: Package game.love
        run: |
          cd mygame
          echo "=== Файлы в проекте ==="
          ls -la
          zip -9 -r ../game.love *.lua sand.png native_particles.cpp 2>/dev/null || zip -9 -r ../game.love *.lua sand.png
          echo "=== Содержимое .love ==="
          unzip -l ../game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          echo "game.love скопирован!"

      - name: Force arm64-v8a only
        run: |
          cd love-android
          sed -i '/abiFilters/d' app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      - name: Gradle properties
        run: |
          cd love-android
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=false
          android.enableR8.fullMode=false
          EOF

      - name: Build APK
        working-directory: love-android
        run: |
          echo "=== НАЧИНАЕМ СБОРКУ ==="
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --max-workers=4 \
            --build-cache \
            --parallel \
            -x lint \
            -x test \
            -x lintVitalEmbedNoRecordDebug \
            2>&1 | tee build.log
          echo "=== РЕЗУЛЬТАТ СБОРКИ ==="
          tail -20 build.log

      - name: Find APK
        if: always()
        run: |
          echo "=== ИЩЕМ APK ==="
          find love-android -name "*.apk" -type f 2>/dev/null || echo "APK НЕ НАЙДЕН"
          echo "=== ВСЕ ФАЙЛЫ В OUTPUTS ==="
          find love-android/app/build/outputs -type f 2>/dev/null || echo "Нет outputs"
          echo "=== ПРОВЕРКА СБОРКИ ==="
          ls -la love-android/app/build/outputs/apk/embedNoRecord/debug/ 2>/dev/null || echo "Нет debug папки"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: |
            love-android/app/build/outputs/apk/**/*.apk
            build.log
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
