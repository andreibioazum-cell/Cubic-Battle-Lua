name: Build_Lua_Game_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Clone love-android (official build template)
        run: |
          git clone --recursive https://github.com/love2d/love-android.git
          cd love-android
          echo "=== love-android files ==="
          ls -la

      - name: Package game into .love file
        run: |
          cd mygame
          # Удаляем workflow и readme из .love (не нужны в игре)
          mkdir -p ../game-temp
          # Копируем только .lua файлы и conf
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/
          done
          # Если есть assets — копируем тоже
          [ -d "assets" ] && cp -r assets ../game-temp/
          [ -d "images" ] && cp -r images ../game-temp/
          [ -d "sounds" ] && cp -r sounds ../game-temp/

          cd ../game-temp
          echo "=== Files inside .love ==="
          ls -la

          # Создаём .love (это zip)
          zip -9 -r ../game.love .
          cd ..
          ls -la game.love

      - name: Embed game.love into love-android assets
        run: |
          # love-android умеет встраивать игру через assets/game.love
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          echo "Embedded game.love into love-android"
          ls -la love-android/app/src/embed/assets/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          NDK_VER="25.2.9519653"
          yes | sdkmanager --install "ndk;$NDK_VER" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV
          ls $ANDROID_HOME/ndk/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build embed APK (with game inside)
        working-directory: love-android
        run: |
          chmod +x gradlew
          echo "=== Available tasks ==="
          ./gradlew tasks --no-daemon 2>&1 | grep -i "assemble" | head -20
          echo ""
          echo "=== Building embed-debug ==="
          ./gradlew assembleEmbedNoRecordDebug --no-daemon --stacktrace 2>&1 | tail -100 || \
          ./gradlew assembleEmbedDebug --no-daemon --stacktrace 2>&1 | tail -100 || \
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Find APK files
        if: always()
        run: |
          echo "=== All APK files ==="
          find love-android -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== Outputs structure ==="
          ls -laR love-android/app/build/outputs/ 2>/dev/null || echo "no outputs"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MyLuaGame_APK
          path: |
            love-android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
