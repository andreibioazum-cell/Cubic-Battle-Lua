name: Build_Lua_Game_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout my game
        uses: actions/checkout@v4
        with:
          path: mygame

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" 2>&1 | tail -3
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone love-android
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          echo "=== Cloned ==="
          ls -la love-android/

      - name: Remove SDL gradle wrappers
        run: |
          find love-android/app/src/main/cpp -name "gradle-wrapper.jar" -delete 2>/dev/null || true

      - name: Package game
        run: |
          mkdir -p game-temp
          cd mygame
          for f in *.lua; do
            [ -f "$f" ] && cp "$f" ../game-temp/ && echo "Added: $f"
          done
          cd ../game-temp
          ls -la
          zip -9 -q -r ../game.love .
          cd ..
          ls -la game.love

      - name: Embed game.love
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          ls -la love-android/app/src/embed/assets/

      - name: Force arm64-v8a only
        run: |
          cd love-android
          BUILD_FILE="app/build.gradle"
          [ -f "app/build.gradle.kts" ] && BUILD_FILE="app/build.gradle.kts"
          sed -i '/abiFilters/d' "$BUILD_FILE"
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' "$BUILD_FILE"

      - name: Gradle properties
        run: |
          cd love-android
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=false
          EOF

      - name: Build APK (with FULL log saved)
        working-directory: love-android
        timeout-minutes: 22
        continue-on-error: true
        run: |
          chmod +x gradlew

          echo "=== Trying assembleEmbedNoRecordDebug ==="
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-1.log | tail -50

          if find . -name "*.apk" -type f | grep -q apk; then
            echo "✅ APK created on attempt 1"
            exit 0
          fi

          echo ""
          echo "=== Attempt 2: assembleEmbedDebug ==="
          ./gradlew assembleEmbedDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-2.log | tail -50

          if find . -name "*.apk" -type f | grep -q apk; then
            echo "✅ APK created on attempt 2"
            exit 0
          fi

          echo ""
          echo "=== Attempt 3: assembleDebug ==="
          ./gradlew assembleDebug \
            --no-daemon --max-workers=4 -PdisableCheckLicense \
            --stacktrace 2>&1 | tee build-3.log | tail -50

          if find . -name "*.apk" -type f | grep -q apk; then
            echo "✅ APK created on attempt 3"
            exit 0
          fi

          echo ""
          echo "❌ All attempts failed"

      - name: Show critical errors from logs
        if: always()
        working-directory: love-android
        run: |
          for log in build-1.log build-2.log build-3.log; do
            if [ -f "$log" ]; then
              echo ""
              echo "=============================="
              echo "=== $log ==="
              echo "=============================="
              echo ""
              echo "--- LAST 30 LINES ---"
              tail -30 "$log"
              echo ""
              echo "--- ERROR LINES ---"
              grep -iE "error:|FAILED|exception|cannot find|undefined reference" "$log" | head -20 || echo "(no error lines)"
            fi
          done

      - name: Hunt for APK everywhere
        if: always()
        run: |
          echo "=== Searching whole workspace ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== build/outputs full tree ==="
          find love-android/app/build -type f 2>/dev/null | head -50

          APK=$(find love-android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo ""
            echo "✅✅✅ FOUND APK: $APK"
            cp "$APK" "$GITHUB_WORKSPACE/CubicBattle.apk"
            ls -la "$GITHUB_WORKSPACE/CubicBattle.apk"
          else
            echo ""
            echo "❌ No APK anywhere"
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload ALL build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs
          path: |
            love-android/build-*.log
          if-no-files-found: ignore
          retention-days: 7
