name: Build_Cubic_Battle_3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout game code
        uses: actions/checkout@v4
        with:
          path: game
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v6

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache love-android
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v7-${{ hashFiles('love-android/.git') }}
          restore-keys: |
            love-android-src-v7-

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            love-android/.gradle
          key: gradle-v7-${{ hashFiles('love-android/build.gradle', 'love-android/app/build.gradle') }}
          restore-keys: |
            gradle-v7-

      - name: Cache Native Builds
        uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
            love-android/app/build/intermediates
          key: native-v7-${{ hashFiles('love-android/app/src/main/cpp/*') }}
          restore-keys: |
            native-v7-

      - name: Change package name to com.CB3
        run: |
          # Меняем package name в build.gradle
          sed -i 's/org.love2d.android/com.CB3/g' love-android/app/build.gradle
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle
          
          # Меняем название приложения
          sed -i 's/LOVE/Cubic Battle 3/g' love-android/app/src/main/res/values/strings.xml
          
          # Меняем имя APK
          sed -i 's/LOVE/CubicBattle3/g' love-android/app/build.gradle

      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*" -x "*.md" -x "*.txt" -x ".gitignore"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64 only
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.configureondemand=true
          android.enableDexingArtifactTransformDesugaring=false
          android.disableCompileSdkCheck=true
          EOF

      - name: Build APK
        working-directory: love-android
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain --max-workers=4

      - name: Collect APK
        run: |
          APK=$(find love-android -name "*.apk" -type f | head -1)
          cp "$APK" CubicBattle3.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3_APK
          path: CubicBattle3.apk
          compression-level: 0
          retention-days: 7
